name: Prevent Changes to Specific File

on:
  push:
    branches:
      - "flask"
      - "test"
  pull_request:
    branches:
      - "flask"
      - "test"

jobs:
  block-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Get the list of changed files
        id: changes
        run: |
          BASE_REF=${{ github.event.pull_request.base.sha }}
          HEAD_REF=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES=$(git diff --name-only $BASE_REF $HEAD_REF)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo "::set-output name=changed_files::$CHANGED_FILES"

      - name: Block Changes to Restricted File
        if: contains(steps.changes.outputs.changed_files, 'path/to/restricted_file')
        run: |
          echo "Error: Changes to path/to/restricted_file are not allowed."
          exit 1
